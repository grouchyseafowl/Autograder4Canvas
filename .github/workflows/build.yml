name: Build Executables

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ============================================================
  # Windows Portable — smoke-test on every push to main
  # Tests that the portable build installs, imports, and runs
  # ============================================================
  test-windows-portable:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Assemble the portable folder from tracked source files
      - name: Assemble portable folder
        shell: pwsh
        run: |
          $root = "portable_test"
          $src  = "$root\src"
          New-Item -Force -ItemType Directory "$src\Programs" | Out-Null
          New-Item -Force -ItemType Directory "$src\modules"  | Out-Null
          Copy-Item -Recurse -Force "src\config"       "$src\config"
          Copy-Item -Force "src\run_autograder_v1-3.py"        "$src\run_autograder.py"
          Copy-Item -Force "src\autograder_utils.py"           "$src\"
          Copy-Item -Force "src\requirements.txt"              "$src\"
          Copy-Item -Force "src\Programs\*.py"                 "$src\Programs\"
          Copy-Item -Force "src\modules\*.py"                  "$src\modules\"
          # Launcher scripts from the tracked windows launcher directory
          Copy-Item -Force "scripts\windows\run.bat"           "$root\"
          Copy-Item -Force "scripts\windows\credentials.bat"   "$root\"
          Write-Host "Portable folder assembled."

      - name: Syntax-check all Python files
        shell: pwsh
        run: |
          $dirs = @(
            "portable_test\src",
            "portable_test\src\Programs",
            "portable_test\src\modules"
          )
          $failed = $false
          foreach ($dir in $dirs) {
            Get-ChildItem "$dir\*.py" | ForEach-Object {
              python -m py_compile $_.FullName 2>&1 | Out-Null
              if ($LASTEXITCODE -ne 0) {
                Write-Host "SYNTAX ERROR: $($_.Name)"
                $failed = $true
              } else {
                Write-Host "OK: $($_.Name)"
              }
            }
          }
          if ($failed) { exit 1 }
          Write-Host "All Python files pass syntax check."

      # Let the script manage its own .venv (same as real-user flow).
      # Use PowerShell for the smoke test so UTF-8 output and string matching
      # work reliably (cmd + findstr has encoding issues with emoji output).
      # Feed "1" then "Q" so the first-time setup prompt and main menu both
      # get a valid answer without looping or producing error messages.
      - name: Smoke-test launcher startup
        shell: pwsh
        run: |
          $env:CANVAS_BASE_URL    = "https://test.instructure.com"
          $env:CANVAS_API_TOKEN   = "test_token_for_ci"
          $env:PYTHONIOENCODING   = "utf-8"
          Set-Location portable_test
          # "1`nQ`n" → answer "1" to the first-time-setup location prompt,
          # then "Q" to the main-menu quit prompt.
          $output = "1`nQ`n" | python src\run_autograder.py 2>&1
          $output | ForEach-Object { Write-Host $_ }
          $joined = $output -join "`n"
          if ($joined -notmatch "(?i)canvas|autograder|menu|goodbye") {
            Write-Host "LAUNCHER produced no recognisable output"
            exit 1
          }
          Write-Host "Launcher smoke test passed."

      # Verify credentials.bat behaves correctly:
      #   1. When double-clicked (no /from-run arg): shows setup instructions
      #   2. When called by run.bat (with /from-run): sets env vars
      - name: Test credentials.bat direct-launch guard
        shell: pwsh
        run: |
          # Test 1: double-click scenario — pipe a newline to satisfy `pause`, expect exit 0
          $output = "`n" | cmd /c "call portable_test\credentials.bat" 2>&1
          Write-Host "--- credentials.bat standalone output ---"
          $output | ForEach-Object { Write-Host $_ }
          $joined1 = $output -join "`n"
          if ($joined1 -notmatch "(?i)setup|notepad|edit|credentials") {
            Write-Host "FAIL: credentials.bat did not show setup instructions"
            exit 1
          }
          Write-Host "PASS: credentials.bat showed setup instructions when double-clicked."

          # Test 2: called-by-run.bat scenario (/from-run arg) — env vars should be set
          $lines = '@echo off', 'setlocal enabledelayedexpansion', 'call portable_test\credentials.bat /from-run', 'echo URL=!CANVAS_BASE_URL!'
          Set-Content -Path "test_creds_caller.bat" -Value $lines -Encoding ascii
          $result = cmd /c test_creds_caller.bat 2>&1
          Write-Host "--- credentials.bat called-by-launcher output ---"
          $result | ForEach-Object { Write-Host $_ }
          $joined2 = $result -join "`n"
          if ($joined2 -notmatch "URL=https?://") {
            Write-Host "FAIL: credentials.bat did not set CANVAS_BASE_URL"
            exit 1
          }
          Write-Host "PASS: credentials.bat set env vars correctly when called by launcher."

      - name: Upload portable folder as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Autograder4Canvas-Windows-Portable
          path: portable_test/

  # ============================================================
  # macOS — builds a .app bundle wrapped in a DMG
  # ============================================================
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/requirements.txt
          pip install pyinstaller pillow

      - name: Convert icon to .icns
        run: |
          if [ -f src/icon.jpg ]; then
            mkdir -p /tmp/AppIcon.iconset
            python3 - <<'PY'
          from PIL import Image
          import os
          img = Image.open("src/icon.jpg").convert("RGBA")
          sizes = [16,32,64,128,256,512,1024]
          for s in sizes:
              img.resize((s,s), Image.LANCZOS).save(f"/tmp/AppIcon.iconset/icon_{s}x{s}.png")
              if s <= 512:
                  img.resize((s*2,s*2), Image.LANCZOS).save(f"/tmp/AppIcon.iconset/icon_{s}x{s}@2x.png")
          PY
            iconutil -c icns /tmp/AppIcon.iconset -o src/AppIcon.icns
            echo "ICON_FLAG=--icon src/AppIcon.icns" >> $GITHUB_ENV
          else
            echo "ICON_FLAG=" >> $GITHUB_ENV
          fi

      - name: Build macOS app
        run: |
          pyinstaller --name "Autograder4Canvas" \
            --windowed \
            $ICON_FLAG \
            --add-data "src/Programs:Programs" \
            --add-data "src/config:config" \
            --add-data "src/modules:modules" \
            --add-data "src/docs:docs" \
            --osx-bundle-identifier "com.autograder4canvas.app" \
            src/run_autograder_v1-3.py

      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "Autograder4Canvas" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --app-drop-link 450 185 \
            "Autograder4Canvas-macOS.dmg" \
            "dist/Autograder4Canvas.app"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: Autograder4Canvas-macOS
          path: Autograder4Canvas-macOS.dmg

  # ============================================================
  # Windows — builds a standalone .exe (no Python required)
  # ============================================================
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/requirements.txt
          pip install pyinstaller pillow

      - name: Convert icon to .ico
        shell: python
        run: |
          import os
          from PIL import Image
          if os.path.exists("src/icon.jpg"):
              img = Image.open("src/icon.jpg").convert("RGBA")
              img.save("src/icon.ico", format="ICO", sizes=[(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)])
              print("Icon created: src/icon.ico")
          else:
              print("No icon found, skipping")

      - name: Build Windows exe
        shell: cmd
        run: |
          set ICON_FLAG=
          if exist src\icon.ico set ICON_FLAG=--icon src\icon.ico
          pyinstaller --name "Autograder4Canvas" ^
            --onefile ^
            --console ^
            %ICON_FLAG% ^
            --add-data "src/Programs;Programs" ^
            --add-data "src/config;config" ^
            --add-data "src/modules;modules" ^
            --add-data "src/docs;docs" ^
            src/run_autograder_v1-3.py

      - name: Package exe
        run: |
          Compress-Archive -Path dist/Autograder4Canvas.exe -DestinationPath Autograder4Canvas-Windows.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: Autograder4Canvas-Windows
          path: Autograder4Canvas-Windows.zip

  # ============================================================
  # Linux — builds a standalone binary
  # ============================================================
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/requirements.txt
          pip install pyinstaller

      - name: Build Linux binary
        run: |
          pyinstaller --name "Autograder4Canvas" \
            --onefile \
            --add-data "src/Programs:Programs" \
            --add-data "src/config:config" \
            --add-data "src/modules:modules" \
            --add-data "src/docs:docs" \
            src/run_autograder_v1-3.py

      - name: Package binary
        run: |
          mkdir -p Autograder4Canvas-Linux
          cp dist/Autograder4Canvas Autograder4Canvas-Linux/
          tar -czf Autograder4Canvas-Linux.tar.gz Autograder4Canvas-Linux/

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: Autograder4Canvas-Linux
          path: Autograder4Canvas-Linux.tar.gz

  # ============================================================
  # Release — attaches all artifacts to a GitHub Release
  # Only runs when triggered by a version tag (v*)
  # ============================================================
  create-release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            Autograder4Canvas-macOS/Autograder4Canvas-macOS.dmg
            Autograder4Canvas-Windows/Autograder4Canvas-Windows.zip
            Autograder4Canvas-Linux/Autograder4Canvas-Linux.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
