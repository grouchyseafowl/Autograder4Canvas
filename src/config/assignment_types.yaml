# AIC Assignment Mode Profiles
# Version 3.0 — unified mode system replacing old 8-profile taxonomy
#
# Each mode calibrates the AI-integrity checker for a specific assignment context.
#
# personal_voice_authentic: when true, first-person voice and emotional
#   language are treated as authenticity signals. Set true for personal,
#   discussion, and draft writing.
#
# invert_sentence_signals: when true (notes mode), smooth transitions and
#   complete sentences are SUSPICIOUS; fragments and bullets are AUTHENTIC.
#   This is the inverse of the normal essay signal polarity.

version: "3.0.0"
last_updated: "2026-03-15"

# =============================================================================
# AIC ASSIGNMENT MODE PROFILES
# =============================================================================

notes:
  name: "Notes / Summary"
  description: "Lecture notes, reading summaries, study outlines"
  expected_word_count: [50, 600]
  personal_voice_authentic: false
  invert_sentence_signals: true

  marker_weight_adjustments:
    contextual_grounding: 1.4    # Must reference specific course material
    emotional_stakes: 0.6        # Rarely expected in notes
    authentic_voice: 0.8         # Informal fragments are normal
    cognitive_struggle: 1.3      # Working to understand material
    productive_messiness: 1.4    # Incomplete thoughts are authentic

  notes: |
    In notes and summaries, polished complete sentences are suspicious —
    AI-generated notes look like mini-essays. Authentic notes use fragments,
    abbreviations, and non-linear structure. invert_sentence_signals=true
    amplifies AI transition signals and silences personal voice as an
    authenticity marker.

discussion:
  name: "Discussion / Response"
  description: "Discussion board posts, peer responses, class participation"
  expected_word_count: [100, 500]
  personal_voice_authentic: true
  invert_sentence_signals: false

  marker_weight_adjustments:
    contextual_grounding: 1.4    # Must engage with course readings/peers
    emotional_stakes: 1.3        # Personal connection expected
    authentic_voice: 1.2         # Informal engaged voice appropriate
    cognitive_struggle: 0.9      # May be less visible in short responses
    productive_messiness: 0.9    # Less revision expected in informal posts

  notes: |
    Discussion posts should show direct engagement with course materials and
    peers. Personal voice and emotional connection are authenticity markers.

draft:
  name: "Draft (any stage)"
  description: "Rough drafts, in-progress writing, brainstorms"
  expected_word_count: [200, 2000]
  personal_voice_authentic: true
  invert_sentence_signals: false

  marker_weight_adjustments:
    contextual_grounding: 1.0    # Standard
    emotional_stakes: 1.0        # Standard
    authentic_voice: 1.1         # Voice more visible in drafts
    cognitive_struggle: 1.5      # HIGHEST — thinking-in-progress
    productive_messiness: 1.5    # HIGHEST — drafts should be messy

  notes: |
    Drafts should show thinking-in-progress. AI drafts are suspiciously
    polished; authentic human drafts show visible revision and struggle.

personal:
  name: "Personal / Reflective"
  description: "Journals, personal reflections, narrative essays"
  expected_word_count: [200, 1500]
  personal_voice_authentic: true
  invert_sentence_signals: false

  marker_weight_adjustments:
    contextual_grounding: 1.2    # Should reference specific experiences
    emotional_stakes: 1.5        # HIGHEST — personal investment central
    authentic_voice: 1.4         # Strong personal voice expected
    cognitive_struggle: 1.1      # Processing experience and meaning
    productive_messiness: 1.1    # Authentic reflection is sometimes messy

  notes: |
    Personal writing should show genuine emotional engagement and specific
    experience. First-person voice and emotional language are strong
    authenticity signals. AI personal writing is generic; human writing is
    specific and idiosyncratic.

essay:
  name: "Formal Essay / Research"
  description: "Analytical essays, research papers, formal academic writing"
  expected_word_count: [500, 5000]
  personal_voice_authentic: false
  invert_sentence_signals: false

  marker_weight_adjustments:
    contextual_grounding: 1.3    # Specific sources and evidence
    emotional_stakes: 0.8        # Formal register limits overt emotion
    authentic_voice: 0.9         # Academic voice may constrain expression
    cognitive_struggle: 1.3      # Synthesis and analysis visible
    productive_messiness: 0.9    # More polished but revision still visible

  notes: |
    Formal essays use academic register which limits some markers.
    Look for genuine grappling with sources, course-specific angles,
    and intellectual struggle with complex ideas.

lab:
  name: "Lab / Technical"
  description: "Lab reports, technical analysis, scientific writing"
  expected_word_count: [500, 2500]
  personal_voice_authentic: false
  invert_sentence_signals: false

  marker_weight_adjustments:
    contextual_grounding: 1.5    # HIGHEST — specific experimental details essential
    emotional_stakes: 0.5        # Scientific register; personal emotion absent
    authentic_voice: 0.6         # Genre conventions limit voice
    cognitive_struggle: 1.1      # Analysis of results
    productive_messiness: 0.8    # Structured format but imperfect data is authentic

  notes: |
    Lab reports follow strict format which limits several markers.
    Focus on specific experimental details, genuine data interpretation,
    and course-specific methodology. AI lab reports lack real data irregularities.

# =============================================================================
# COURSE LEVEL ADJUSTMENTS
# =============================================================================

course_levels:

  developmental:
    name: "Developmental / Remedial"
    description: "Below college-level courses"
    adjustments:
      suspicious_threshold_multiplier: 0.6    # 40% more lenient
      authenticity_boost: 1.5                # Value effort
      notes: |
        Students may be developing academic writing skills.
        Expect more informal voice, less polish, but genuine engagement.
        Focus on evidence of learning and effort over perfection.

  introductory:
    name: "Introductory (100-level)"
    description: "First-year or general education courses"
    adjustments:
      suspicious_threshold_multiplier: 0.7    # 30% more lenient
      authenticity_boost: 1.2
      notes: |
        Students learning disciplinary conventions and academic voice.
        Expect variation in sophistication. Value engagement over polish.

  intermediate:
    name: "Intermediate (200-300 level)"
    description: "Upper-division undergraduate"
    adjustments:
      suspicious_threshold_multiplier: 1.0    # Standard
      authenticity_boost: 1.0
      notes: |
        Students should show developing mastery of disciplinary writing.
        Standard expectations for engagement and polish.

  advanced:
    name: "Advanced (400-level)"
    description: "Senior seminars, capstone courses"
    adjustments:
      suspicious_threshold_multiplier: 1.1    # Slightly stricter
      authenticity_boost: 0.9
      notes: |
        Students should demonstrate sophisticated engagement with material.
        Higher expectations for synthesis and original thinking.

  honors:
    name: "Honors"
    description: "Honors courses at any level"
    adjustments:
      suspicious_threshold_multiplier: 1.0    # Standard but different focus
      authenticity_boost: 0.9
      notes: |
        Focus on depth of engagement and original thinking.
        Expect sophisticated grappling with complex ideas.

  graduate:
    name: "Graduate"
    description: "Master's or doctoral level"
    adjustments:
      suspicious_threshold_multiplier: 1.2    # Higher expectations
      authenticity_boost: 0.8
      notes: |
        Expect sophisticated engagement with scholarship and original
        contribution to field. Higher polish expected but should still
        show genuine intellectual work.

# =============================================================================
# INSTITUTIONAL CONTEXT ADJUSTMENTS
# =============================================================================

institutional_contexts:

  high_school:
    name: "High School"
    description: "Secondary school courses (grades 9-12)"
    adjustments:
      suspicious_threshold_multiplier: 0.6    # 40% more lenient — formula writing is taught
      authenticity_boost: 1.3
      notes: |
        High school students are explicitly taught formal transitions and
        five-paragraph structure. Inflated vocabulary is the stronger signal.
        Peer comparison on calibrated metrics catches genuine outliers.

  community_college:
    name: "Community College"
    description: "2-year colleges, diverse student populations"
    adjustments:
      suspicious_threshold_multiplier: 0.7    # 30% more lenient
      notes: |
        Diverse student populations: returning students, ESL students,
        first-generation college students. Wide range of academic
        preparation. Value engagement and growth over polish.

  liberal_arts:
    name: "Liberal Arts College"
    description: "4-year liberal arts institutions"
    adjustments:
      suspicious_threshold_multiplier: 1.0    # Standard
      notes: |
        Focus on writing across curriculum. Students develop
        writing skills throughout college experience.

  research_university:
    name: "Research University"
    description: "Large research institutions"
    adjustments:
      suspicious_threshold_multiplier: 1.0    # Standard
      notes: |
        Mix of course sizes and levels. Adjust based on course level.

  online:
    name: "Online / Distance Learning"
    description: "Fully online courses"
    adjustments:
      suspicious_threshold_multiplier: 0.8    # Slightly more lenient
      notes: |
        Students may have less access to in-person support.
        Discussion posts and asynchronous engagement central.
        May see more diverse student demographics.

# =============================================================================
# DEFAULT CONFIGURATION
# =============================================================================

default:
  aic_mode: "essay"
  course_level: "intermediate"
  institutional_context: "liberal_arts"

  notes: |
    If no specific mode provided, system uses intermediate-level essay
    expectations at a liberal arts college context.
