# Marker Manifest
# Version 2.0.0
# Tracks installed markers, versions, and update information

manifest_version: "2.1.0"
last_updated: "2025-12-27"
schema_version: "2.1"

# Update configuration
updates:
  check_frequency: weekly
  update_channel: stable
  auto_update: false
  notify_on_update: true

