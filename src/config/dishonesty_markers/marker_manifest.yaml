  ai_specific_organization:
    version: "2.0.1"
    installed_date: "2025-12-27"
    category: suspicious_presence
    checksum: null
    no_cognitive_protection: true
    note: "AI-specific organizational patterns (excessive headers, perfect balance, etc.) - NOT subject to cognitive diversity protection"

  authentic_voice:
